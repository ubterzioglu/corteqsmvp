            {
              "@type": "Question",
              "name": "CorteQS nedir ve nasıl çalışır?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "CorteQS, yurt dışındaki Türk diasporasını şehir bazlı olarak danışmanlar, işletmeler, topluluklar, içerik üreticileri ve fırsat alanlarıyla buluşturan bir diaspora network platformudur. Amaç yalnızca bir rehber sunmak değil, aynı şehirde veya aynı ihtiyaca yakın insanları daha hızlı ve daha anlamlı biçimde bir araya getirmektir. Kullanıcılar kategori seçerek kayıt bırakır, yaşadıkları ya da taşınmak istedikleri şehri belirtir ve platform açıldığında kendi kullanım senaryolarına uygun alanlara yönlendirilir."
              }
            },
            {
              "@type": "Question",
              "name": "Yurtdışına taşınmak için CorteQS nasıl yardımcı olur?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yurt dışına taşınma sürecinde en büyük zorluk, doğru bilgiye ve doğru kişiye zamanında ulaşmaktır. CorteQS, vize, oturum, ev bulma, iş arama, şehirde ilk kurulum ve yerel yaşam gibi başlıklarda şehir bazlı bağlantılar kurmanıza yardımcı olmayı hedefler. Bu sayede belirsizlik azalır, ilk bağlantılar daha erken kurulur ve yeni bir şehirde sosyal ve profesyonel ağ oluşturma süreci hızlanır."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS'te nasıl danışman bulabilirim?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "CorteQS'te danışman bulma mantığı, ihtiyacınızı genel kalabalık içinde kaybetmeden daha hedefli bir filtreleme sunmaktır. Vize, oturum, emlak, iş kurma, vergi, hukuk veya kariyer gibi başlıklarda hangi konuda destek aradığınızı belirtmeniz, sizi daha uygun profillere yaklaştırır. Yaşadığınız veya gitmek istediğiniz şehir bilgisinin eklenmesi de yerel uzmanlara ulaşmayı kolaylaştırır."
              }
            },
            {
              "@type": "Question",
              "name": "İşletmemi CorteQS'e nasıl eklerim?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "İşletmeler CorteQS'e kayıt bırakarak kendi şehirlerinde ve hedefledikleri diaspora kitlesi içinde daha görünür hale gelmeyi amaçlayabilir. Bu görünürlük yalnızca müşteri bulmak için değil, aynı zamanda iş ortaklıkları, tedarik bağlantıları, etkinlik katılımı ve diaspora içindeki güven ilişkilerini güçlendirmek için de değerlidir. Platform yapısı, işletmelerin kendilerini kategori ve konum üzerinden konumlandırmasına imkan verir."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS şehir elçisi (Ambassador) nedir, nasıl olunur?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Şehir elçileri, CorteQS'in yerel topluluk ayağını güçlendiren kişiler olarak düşünülür. Bulundukları şehirde diaspora ağını görünür kılmak, insanları birbirine bağlamak, etkinlikleri desteklemek ve yerel ihtiyaçları merkeze taşımak bu rolün temel parçalarıdır. Şehir elçisi olmak isteyen kişiler ilgili kategori üzerinden başvuru bırakabilir ve kendi şehirleri için ilgi gösterebilir."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS üzerinden etkinliklere nasıl katılabilirim?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Etkinlikler diaspora topluluklarında güven ve ilişki kurmanın en hızlı yollarından biridir. CorteQS, bulunduğunuz şehirde veya ilgi duyduğunuz lokasyonlarda gerçekleşen buluşmaları, topluluk etkinliklerini, iş odaklı görüşmeleri ve içerik temelli organizasyonları daha erişilebilir hale getirmeyi hedefler. Bu model hem sosyal bağları kuvvetlendirir hem de profesyonel network oluşturmayı daha doğal hale getirir."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS ücretsiz mi?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "CorteQS'in erken erişim ve temel katılım tarafı ücretsiz kurgulanmaktadır. Kullanıcıların kategori seçip kayıt bırakabilmesi, platform açılışıyla ilgili haber alması ve ilk topluluk akışına dahil olması için ücretli bir bariyer öngörülmemektedir. İlerleyen aşamalarda premium görünürlük veya gelişmiş kullanım imkanları sunulabilir, ancak ana yaklaşım temel ağ kurma deneyimini erişilebilir tutmaktır."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS hangi ülkelerde ve şehirlerde aktif?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "CorteQS küresel bir diaspora fikriyle kurulsa da en güçlü başlangıç, Türk diasporasının yoğun olduğu şehirler üzerinden yapılmaktadır. Berlin, Londra, Amsterdam, Dubai, Sydney ve New York gibi merkezler ilk ilgi odağı olan şehirler arasında yer alırken, kayıt bırakan topluluk yoğunluğuna göre yeni lokasyonlar da önceliklendirilecektir. Bu yaklaşım platformun gerçek ihtiyaç ve topluluk hareketine göre büyümesini sağlar."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS ile iş veya müşteri bulabilir miyim?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Evet, CorteQS'in önemli kullanım alanlarından biri iş ve müşteri bağlantılarıdır. Danışmanlar uzmanlıklarını daha görünür hale getirebilir, işletmeler kendi hedef kitlelerine ulaşabilir ve bireysel kullanıcılar da iş, proje, ortaklık veya yönlendirme fırsatlarını keşfetmeye daha yakın hale gelir. Diaspora bağlamı içinde kurulan bu temaslar çoğu zaman daha hızlı güven üretir ve daha somut sonuçlara dönüşebilir."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS'e nasıl katılabilirim?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "CorteQS'e katılmak için landing page üzerindeki kayıt alanından kategorinizi seçerek ilginizi bırakmanız yeterlidir. Danışman, işletme, dernek, vakıf, içerik üreticisi, şehir elçisi veya bireysel kullanıcı olarak hangi rolde yer almak istediğinizi belirtmeniz, açılış sonrası size uygun akışların hazırlanmasına yardımcı olur. Kayıt bırakan kullanıcılar erken erişim duyurularını ve toplulukla ilgili haberleri takip edebilir."
              }
            },
            {
              "@type": "Question",
              "name": "Almanya'ya taşınmak istiyorum, CorteQS relocation sürecinde nasıl yardımcı olur?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Almanya'ya taşınma sürecinde vize başvuruları, oturum izni (Aufenthaltstitel), ev bulma, Anmeldung, banka hesabı açma ve sağlık sigortası gibi birçok adım vardır. CorteQS, bu süreçlerde Almanya'daki Türk diasporasından doğrulanmış danışmanlar ve şehir elçileriyle sizi buluşturur. Berlin, Dortmund, Köln, Hamburg ve München gibi şehirlerde yerel danışmanlar ve topluluk üyeleri, relocation sürecinizde size rehberlik edebilir."
              }
            },
            {
              "@type": "Question",
              "name": "CorteQS'te doğrulanmış hizmet sağlayıcılarını nasıl bulabilirim?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "CorteQS, platformdaki danışman ve hizmet sağlayıcılarını doğrulama sürecinden geçirir. Doğrulanmış sağlayıcılar, profesyonel niteliklerini ve diaspora topluluğundaki güvenilirliklerini kanıtlamış kişilerdir. Platform açıldığında danışman profillerinde doğrulama durumu görüntülenecek, kullanıcılar değerlendirme ve geri bildirimlerle topluluk kalitesini destekleyebilecektir."
              }
            }
          ]
